{% extends 'adventure/base.html' %}
{% load static %}

{% block content %}
<section id="login-section" class="panel view">
    <div id="login-box">
        <h2><span class="icon">🗝️</span> Prêt pour l'aventure ?</h2>
        <form method="post" id="login-form">
            {% csrf_token %}
            {% if form.errors %}
            <p style="color: red;">Identifiants incorrects. Réessaie !</p>
            {% endif %}
            <div class="form-group">
                <label for="username">Nom d'aventurier</label>
                <input type="text" name="username" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility(this)" title="Afficher/Masquer le mot de passe">👁️</button>
                </div>
            </div>
            <button type="submit">Se connecter</button>
        </form>
        <p class="hint">Nouveau ici ? <a href="#" id="show-register">Crée ton profil d'aventurier</a></p>
    </div>
</section>
{% endblock %}
