<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet de Vie me Libère</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <style>
        .landing-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            background: linear-gradient(135deg, #ffcc00 0%, #ff4500 100%);
            border: 5px solid black;
            box-shadow: 15px 15px 0 black;
            margin: 2rem;
            border-radius: 20px;
            padding: 2rem;
        }
        .landing-title {
            font-size: 4rem;
            color: white;
            -webkit-text-stroke: 2px black;
            text-shadow: 5px 5px 0 black;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .landing-subtitle {
            font-size: 1.5rem;
            background: white;
            padding: 1rem 2rem;
            border: 3px solid black;
            box-shadow: 5px 5px 0 black;
            margin-bottom: 3rem;
            transform: rotate(-1deg);
        }
        .start-adventure-btn {
            font-size: 2rem;
            padding: 1.5rem 3rem;
            background: #333;
            color: white;
            text-decoration: none;
            border: 4px solid black;
            box-shadow: 8px 8px 0 #ffcc00;
            transition: all 0.2s;
        }
        .start-adventure-btn:hover {
            transform: scale(1.1) rotate(1deg);
            box-shadow: 12px 12px 0 #ffcc00;
            background: black;
        }
        @media (max-width: 768px) {
            .landing-title { font-size: 2.5rem; }
            .landing-hero { margin: 1rem; padding: 1rem; }
        }
    </style>
</head>
<body>
    <main>
        <section class="landing-hero">
            <h1 class="landing-title">Mon Projet de Vie<br>me Libère</h1>
            <div class="landing-subtitle">Prends les commandes de ton futur !</div>
            <a href="/adventure" class="start-adventure-btn">Lancer l'Aventure de l'Orientation ⚔️</a>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Mon Projet de Vie</p>
    </footer>
</body>
</html>
