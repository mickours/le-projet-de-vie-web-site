<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'aventure de l'Orientation</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <style>
        .landing-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            border: 5px solid var(--border-main);
            box-shadow: 15px 15px 0 var(--border-main);
            margin: 2rem;
            border-radius: 20px;
            padding: 2rem;
        }
        .landing-title {
            font-size: 4rem;
            color: white;
            -webkit-text-stroke: 2px var(--border-main);
            text-shadow: 5px 5px 0 var(--border-main);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .landing-subtitle {
            font-size: 1.5rem;
            background: white;
            padding: 1rem 2rem;
            border: 3px solid var(--border-main);
            box-shadow: 5px 5px 0 var(--border-main);
            margin-bottom: 3rem;
            transform: rotate(-1deg);
            color: var(--text-header);
        }
        .start-adventure-btn {
            font-size: 2rem;
            padding: 1.5rem 3rem;
            background: white;
            color: var(--text-header);
            text-decoration: none;
            border: 4px solid var(--border-main);
            box-shadow: 8px 8px 0 var(--border-main);
            transition: all 0.2s;
            font-weight: bold;
        }
        .start-adventure-btn:hover {
            transform: scale(1.1) rotate(1deg);
            box-shadow: 12px 12px 0 var(--accent-color);
            background: var(--primary-light);
        }
        @media (max-width: 768px) {
            .landing-title { font-size: 2.5rem; }
            .landing-hero { margin: 1rem; padding: 1rem; }
        }
    </style>
</head>
<body>
    <main>
        <section class="landing-hero">
            <h1 class="landing-title">L'aventure de<br>l'Orientation</h1>
            <div class="landing-subtitle">Prends les commandes de ton futur !</div>
            <a href="/adventure" class="start-adventure-btn">Lancer l'Aventure ⚔️</a>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 L'aventure de l'Orientation</p>
    </footer>
</body>
</html>
